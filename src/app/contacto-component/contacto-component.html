<div class="container mt-4">
    <h2>Datos para el envío</h2>

    <form [formGroup]="formulario" (ngSubmit)="enviarPedido()">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" formControlName="nombre">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control" formControlName="apellido">
            </div>
        </div>

        <div>
            <div class="row">
                <label class="col-md-6 mb-3">Teléfono</label>
                <input type="tel" class="form-control" formControlName="telefono">
            </div>
            <div class="row">
                <label class="col-md-6 mb-3">Email</label>
                <input type="email" class="form-control" formControlName="email">
            </div>
        </div>

        <hr>

        <h4>Dirección</h4>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Calle</label>
                <input type="text" class="form-control" formControlName="calle">
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Número</label>
                <input type="number" class="form-control" formControlName="numero">
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Piso</label>
                <input type="text" class="form-control" formControlName="piso">
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Depto.</label>
                <input type="text" class="form-control" formControlName="departamento">
            </div>
        </div>

        <hr>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea rows="4" class="form-control" formControlName="observaciones"></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label">Forma de pago</label>
            <select class="form-select" formControlName="pago">
                <option class="bkg-select">Efectivo</option>
                <option>Débito</option>
                <option>Crédito</option>
                <option>Mercado Pago</option>
            </select>
        </div>

        <button class="btn btn-warning btn-lg" [disabled]="formulario.invalid">Enviar pedido</button>

    </form>
    
</div>
